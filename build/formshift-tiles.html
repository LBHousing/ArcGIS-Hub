<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Form Shift Tiles</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;color:#f1f5f9;-webkit-font-smoothing:antialiased;padding:0 28px}
.wrap{max-width:1080px;margin:0 auto}em{font-style:italic}
.bl{color:#4d8ae8}.rd{color:#D2333F}.pp{color:#F7BA21}.gn{color:#34d399}.pu{color:#9d6fc7}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.gridm{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.card{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:24px}
h3{font-size:14px;font-weight:600;margin-bottom:2px}.cs{font-size:11px;color:#64748b;margin-bottom:14px}
.cw{position:relative;width:100%;height:300px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:12px;font-size:12px;color:#94a3b8}
.legend span{display:flex;align-items:center;gap:6px}.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.m{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px}
.m .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.m .lb{font-size:13px;color:#94a3b8}.m .vl{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.m .pc{font-size:12px;color:#64748b;margin-bottom:8px}
.track{height:6px;background:#0a0e1a;border-radius:3px;overflow:hidden}.fill{height:100%;border-radius:3px;transition:width 1.4s ease}
.m .dt{font-size:11px;margin-top:7px;font-weight:600}.dr{color:#D2333F}.dg{color:#34d399}.dn{color:#64748b}
.narr{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:34px}
.narr h2,.narr h4{font-family:'Instrument Serif',serif;font-size:24px;font-weight:400;margin-bottom:14px}
.narr p{font-size:15px;color:#94a3b8;margin-bottom:13px;line-height:1.7;font-weight:300}.narr strong{color:#f1f5f9;font-weight:600}
.hlbox{background:rgba(247,186,33,.06);border-left:3px solid #F7BA21;padding:14px 18px;border-radius:0 8px 8px 0;margin-top:16px;font-size:14px;color:#94a3b8;line-height:1.65}
.hlbox.blue{background:rgba(39,106,219,.06);border-color:#276ADB}.hlbox strong{color:#f1f5f9}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.tile{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:22px}
.tile .n{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}.tile .l{font-size:13px;color:#94a3b8;margin-top:8px;line-height:1.45}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.sp{border-radius:14px;padding:20px 22px;border:1px solid rgba(255,255,255,.06)}
.sp.m2{background:linear-gradient(135deg,rgba(210,51,63,.14),rgba(210,51,63,.04))}.sp.a2{background:linear-gradient(135deg,rgba(52,211,153,.12),rgba(39,106,219,.05))}
.sp .k{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}.sp.m2 .k{color:#D2333F}.sp.a2 .k{color:#34d399}
.sp .v{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}.sp .d{font-size:13px;color:#94a3b8;margin-top:8px;line-height:1.5}
.acard{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.acard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.acard.market::before{background:#D2333F}.acard.affordable::before{background:#34d399}.acard.public::before{background:#276ADB}
.actop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.acname{font-size:16px;font-weight:600;line-height:1.25}
.acbuild{font-size:12.5px;color:#64748b;margin-bottom:12px}.tags{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.tg{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:5px;white-space:nowrap}
.tg.form{background:rgba(255,255,255,.06);color:#94a3b8}.tg.market{background:rgba(210,51,63,.14);color:#e8636d}.tg.affordable{background:rgba(52,211,153,.12);color:#34d399}.tg.public{background:rgba(39,106,219,.14);color:#4d8ae8}
.acrow{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-top:6px}
.acdelta{font-size:25px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}.acdelta small{font-size:12px;font-weight:500;color:#64748b;display:block;margin-top:3px}
.market .acdelta{color:#e8636d}.affordable .acdelta{color:#34d399}.public .acdelta{color:#4d8ae8}
.acblurb{font-size:12.5px;color:#94a3b8;line-height:1.55;margin-top:13px;padding-top:13px;border-top:1px solid rgba(255,255,255,.05)}
.mech{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.mc{border-radius:14px;padding:22px;border:1px solid rgba(255,255,255,.06);background:#1e2540}
.mc .v{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}.mc .t{font-size:14px;font-weight:600;color:#f1f5f9;margin-top:10px}.mc .d{font-size:13px;color:#94a3b8;margin-top:6px;line-height:1.5}
.mc.r .v{color:#F7BA21}.mc.a .v{color:#D2333F}
.acq-card{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px 20px;border-left:3px solid #D2333F}
.acq-name{font-size:15.5px;font-weight:600}.acq-meta{font-size:12px;color:#64748b;margin-top:3px}
.acq-stats{display:flex;gap:18px;margin-top:13px;flex-wrap:wrap}.acq-stats .n{font-size:19px;font-weight:700;color:#e8636d;font-variant-numeric:tabular-nums;line-height:1}.acq-stats .l{font-size:11px;color:#94a3b8;margin-top:3px}
.acq-zip{font-size:11.5px;color:#64748b;margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.05)}
.mhp{background:linear-gradient(135deg,rgba(247,186,33,.1),rgba(247,186,33,.02));border:1px solid rgba(247,186,33,.2);border-radius:16px;padding:24px 26px;margin-top:16px}
.mhp .lab{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#F7BA21;margin-bottom:10px}.mhp p{font-size:15px;color:#e2e8f0;line-height:1.7;font-weight:300}.mhp strong{color:#fff;font-weight:600}
.ladder .bar{margin-bottom:18px}.ladder .bar:last-child{margin-bottom:0}
.bl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}.bl-name{font-size:14.5px;color:#cbd5e1;font-weight:500}.bl-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.ltrack{height:12px;background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden}.lfill{height:100%;border-radius:6px;width:0;transition:width 1.4s cubic-bezier(.22,1,.36,1)}.lcap{font-size:12px;color:#64748b;margin-top:6px;line-height:1.5}
.kicker{background:linear-gradient(135deg,rgba(52,211,153,.1),rgba(39,106,219,.06));border:1px solid rgba(52,211,153,.2);border-radius:16px;padding:28px 26px;margin-top:18px}
.kicker p{font-size:16.5px;color:#e2e8f0;line-height:1.7;font-weight:300}.kicker strong{color:#fff;font-weight:600}.kicker .big{font-family:'Instrument Serif',serif;font-size:22px;color:#34d399;font-style:italic;display:block;margin-top:14px;line-height:1.3}
.rights{background:rgba(52,211,153,.03);border:1px solid rgba(52,211,153,.2);border-radius:14px;padding:34px}
.rights h2{font-family:'Instrument Serif',serif;font-size:24px;color:#34d399;margin-bottom:14px}.rights p{font-size:15px;color:#94a3b8;line-height:1.7;font-weight:300;margin-bottom:10px}
.rights .item{font-size:14px;color:#94a3b8;margin-bottom:6px}.rights .item .arr{color:#34d399;font-weight:700}.rights .item strong{color:#34d399}.rights .item a{color:#F7BA21;font-weight:600;text-decoration:none}
.foot{font-size:12px;color:#64748b;line-height:1.6;margin-top:14px}
@media(max-width:760px){body{padding:0 16px}.grid3,.tiles{grid-template-columns:1fr 1fr}.split,.mech,.grid2{grid-template-columns:1fr}.cw{height:240px}}@media(max-width:520px){.grid3,.gridm,.tiles{grid-template-columns:1fr 1fr;gap:8px}.grid2{grid-template-columns:1fr}.card,.tile{padding:11px}.n{font-size:26px}.cw{height:180px}}
</style></head><body><div class="wrap"><div class="tiles">
 <div class="tile"><div class="n bl" id="f1">0</div><div class="l">units added to LLC ownership, 2018–2026 <span class="bl">(+54.6%)</span></div></div>
 <div class="tile"><div class="n rd" id="f2">0</div><div class="l">units lost by individual owners <span class="rd">(−6.7%)</span></div></div>
 <div class="tile"><div class="n pp" id="f3">0</div><div class="l">of LLC growth came from <em style="color:#cbd5e1">existing</em> stock, not new construction</div></div></div></div><script>function ac(el,t,d,pre,suf){pre=pre||'';suf=suf||'';var c=0,s=Math.max(1,Math.ceil(t/60)),i=setInterval(function(){c+=s;if(c>=t){c=t;clearInterval(i)}el.textContent=pre+c.toLocaleString()+suf},d/60)}ac(document.getElementById('f1'),11148,1500,'+');ac(document.getElementById('f2'),9309,1500,'-');ac(document.getElementById('f3'),6871,1500);</script></body></html>

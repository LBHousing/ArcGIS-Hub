<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Historical</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;color:#f1f5f9;padding:0 28px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto}
.card{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:24px}
h3{font-size:14px;font-weight:600;margin-bottom:2px}.cs{font-size:11px;color:#64748b;margin-bottom:12px}
.lg{display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:#64748b}
.lg span{display:flex;align-items:center;gap:4px}.lg .d{width:8px;height:8px;border-radius:2px}
.cw{position:relative;width:100%;height:280px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid">
  <div class="card"><h3>Parcel & Unit Count (2006–2021)</h3><div class="cs">Source: LA County Assessor Combined Roll</div>
    <div class="lg"><span><span class="d" style="background:#276ADB"></span>Parcels</span><span><span class="d" style="background:#F7BA21"></span>Units</span></div>
    <div class="cw"><canvas id="h1" role="img" aria-label="Parcels and units trend"></canvas></div></div>
  <div class="card"><h3>Total Assessed Value (2006–2021)</h3><div class="cs">$32.6B → $59.5B in 15 years</div>
    <div class="cw"><canvas id="v1" role="img" aria-label="Assessed value trend"></canvas></div></div>
</div>
<script>
Chart.defaults.color='#94a3b8';Chart.defaults.borderColor='rgba(255,255,255,0.06)';
var lb=[2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021],gC='rgba(255,255,255,0.04)',tF={size:10};
var p=[104606,105029,105939,106459,106521,106737,106836,106801,106814,106787,106813,106797,106853,107010,106972,106929];
var u=[179251,179075,179680,179869,179879,180385,180805,181634,182120,182171,182700,183170,183335,183234,183818,184683];
new Chart(document.getElementById('h1'),{type:'line',data:{labels:lb,datasets:[{label:'Parcels',data:p,borderColor:'#276ADB',backgroundColor:'rgba(39,106,219,0.06)',yAxisID:'yp',fill:true,tension:.3,pointRadius:2,borderWidth:2},{label:'Units',data:u,borderColor:'#F7BA21',backgroundColor:'rgba(247,186,33,0.06)',yAxisID:'yu',fill:true,tension:.3,pointRadius:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toLocaleString()}}}},scales:{x:{ticks:{color:'#64748b',font:tF},grid:{display:false}},yp:{position:'left',ticks:{color:'#4d8ae8',font:tF,callback:function(v){return(v/1000).toFixed(0)+'K'}},grid:{color:gC}},yu:{position:'right',ticks:{color:'#C55A11',font:tF,callback:function(v){return(v/1000).toFixed(0)+'K'}},grid:{display:false}}}}});
var d=[32.63,35.77,37.63,36.97,36.27,36.66,37.29,38.89,40.93,42.97,45.15,47.72,50.77,53.85,57.02,59.54];
new Chart(document.getElementById('v1'),{type:'line',data:{labels:lb,datasets:[{label:'Assessed Value ($B)',data:d,borderColor:'#276ADB',backgroundColor:'rgba(39,106,219,0.06)',fill:true,tension:.3,pointRadius:2,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return '$'+c.parsed.y.toFixed(2)+'B'}}}},scales:{x:{ticks:{color:'#64748b',font:tF},grid:{display:false}},y:{ticks:{color:'#64748b',font:tF,callback:function(v){return '$'+v+'B'}},grid:{color:gC}}}}});
</script>
</body>
</html>

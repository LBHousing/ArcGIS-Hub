<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Low-Income Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;color:#f1f5f9;padding:0 28px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto}
.card{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:24px}
h3{font-size:14px;font-weight:600;margin-bottom:2px}.cs{font-size:11px;color:#64748b;margin-bottom:12px}
.lg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:11px;color:#64748b}
.lg span{display:flex;align-items:center;gap:4px}.lg .d{width:8px;height:8px;border-radius:2px}
.cw{position:relative;width:100%;height:280px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid">
  <div class="card">
    <h3>Low-income burden rate — 10-year trend</h3><div class="cs">Rising severe rate: those who remain face worse conditions</div>
    <div class="lg"><span><span class="d" style="background:#F7BA21"></span>Burdened (30%+)</span><span><span class="d" style="background:#D2333F"></span>Severe (50%+)</span></div>
    <div class="cw"><canvas id="c1"></canvas></div>
  </div>
  <div class="card">
    <h3>Low-income household counts — the displacement signal</h3><div class="cs">Declining count = households leaving Long Beach</div>
    <div class="lg"><span><span class="d" style="background:#F7BA21"></span>Total low-income HH</span><span><span class="d" style="background:#D2333F"></span>Severely burdened (50%+)</span></div>
    <div class="cw"><canvas id="c2"></canvas></div>
  </div>
</div>
<script>
Chart.defaults.color='#94a3b8';Chart.defaults.borderColor='rgba(255,255,255,0.06)';
var L=["2014","2015","2016","2017","2018","2019","2020","2021","2022","2023","2024"],gC='rgba(255,255,255,0.04)';
var ln=function(l,d,c,f){var bg='transparent';if(f){if(c.indexOf('rgba')===0){bg=c.replace(/,[^,]+\)$/,',0.06)')}else{bg=c.replace(')',',0.06)').replace('rgb','rgba')}}return{label:l,data:d,borderColor:c,backgroundColor:bg,fill:!!f,tension:.3,pointRadius:2,borderWidth:2}};

new Chart(document.getElementById('c1'),{type:'line',data:{labels:L,datasets:[
  ln('Burdened (30%+)',[85.5,85.4,85.7,86.1,84.8,84.7,85.7,85.0,82.7,81.5,81.1],'rgb(247,186,33)',1),
  ln('Severe (50%+)',[59.5,58.8,59.9,60.9,61.4,62.1,64.6,67.5,68.5,70.1,70.8],'rgb(210,51,63)',1)
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(1)+'%'}}}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{min:50,max:95,ticks:{color:'#64748b',font:{size:10},callback:function(v){return v+'%'}},grid:{color:gC}}}}});

new Chart(document.getElementById('c2'),{type:'line',data:{labels:L,datasets:[
  ln('Total low-income HH',[41082,40969,39319,36557,35185,33304,34792,32594,29775,27648,25917],'rgb(247,186,33)',1),
  ln('Severely burdened',[24443,24070,23544,22259,21600,20681,22484,22003,20389,19385,18359],'rgb(210,51,63)',1)
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+Math.round(c.parsed.y).toLocaleString()}}}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10},callback:function(v){return(v/1000).toFixed(0)+'K'}},grid:{color:gC}}}}});
</script>
</body>
</html>

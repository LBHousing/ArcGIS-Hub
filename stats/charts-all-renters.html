<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>All Renters Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;color:#f1f5f9;padding:0 28px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto}
.card{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:24px}
h3{font-size:14px;font-weight:600;margin-bottom:2px}.cs{font-size:11px;color:#64748b;margin-bottom:12px}
.lg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:11px;color:#64748b}
.lg span{display:flex;align-items:center;gap:4px}.lg .d{width:8px;height:8px;border-radius:2px}
.cw{position:relative;width:100%;height:280px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid">
  <div class="card">
    <h3>Cost burden rate — 10-year trend</h3><div class="cs">Share of renter HH spending 30%+ or 50%+ on housing</div>
    <div class="lg"><span><span class="d" style="background:#276ADB"></span>Burdened (30%+)</span><span><span class="d" style="background:rgba(39,106,219,.35)"></span>Severe (50%+)</span></div>
    <div class="cw"><canvas id="c1"></canvas></div>
  </div>
  <div class="card">
    <h3>Household counts — who's affected</h3><div class="cs">Total and burdened renter households over time</div>
    <div class="lg"><span><span class="d" style="background:#276ADB"></span>Total renter HH</span><span><span class="d" style="background:#D2333F"></span>Cost burdened (30%+)</span></div>
    <div class="cw"><canvas id="c2"></canvas></div>
  </div>
</div>
<script>
Chart.defaults.color='#94a3b8';Chart.defaults.borderColor='rgba(255,255,255,0.06)';
var L=["2014","2015","2016","2017","2018","2019","2020","2021","2022","2023","2024"],gC='rgba(255,255,255,0.04)';
var ln=function(l,d,c,f){return{label:l,data:d,borderColor:c,backgroundColor:f?c.replace(')',',0.06)').replace('rgb','rgba'):'transparent',fill:!!f,tension:.3,pointRadius:2,borderWidth:2}};

new Chart(document.getElementById('c1'),{type:'line',data:{labels:L,datasets:[
  ln('Burdened (30%+)',[55.4,55.0,53.4,52.5,52.7,52.6,52.4,53.2,53.0,53.4,53.1],'rgb(39,106,219)',1),
  ln('Severe (50%+)',[29.9,29.2,28.7,27.8,27.2,26.5,26.2,26.4,26.8,26.8,26.7],'rgba(39,106,219,0.35)',1)
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(1)+'%'}}}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{min:20,max:60,ticks:{color:'#64748b',font:{size:10},callback:function(v){return v+'%'}},grid:{color:gC}}}}});

new Chart(document.getElementById('c2'),{type:'line',data:{labels:L,datasets:[
  ln('Total renter HH',[87263,87836,87832,88132,89064,89642,98870,100458,100410,100690,99965],'rgb(39,106,219)',1),
  ln('Cost burdened',[48359,48281,46911,46271,46906,47148,51831,53470,53195,53802,53104],'rgb(210,51,63)',1)
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+Math.round(c.parsed.y).toLocaleString()}}}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10},callback:function(v){return(v/1000).toFixed(0)+'K'}},grid:{color:gC}}}}});
</script>
</body>
</html>

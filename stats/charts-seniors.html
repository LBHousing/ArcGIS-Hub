<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Senior Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;color:#f1f5f9;padding:0 28px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto}
.card{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:24px}
h3{font-size:14px;font-weight:600;margin-bottom:2px}.cs{font-size:11px;color:#64748b;margin-bottom:12px}
.lg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:11px;color:#64748b}
.lg span{display:flex;align-items:center;gap:4px}.lg .d{width:8px;height:8px;border-radius:2px}
.cw{position:relative;width:100%;height:280px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid">
  <div class="card">
    <h3>Senior 65+ burden rate — 10-year trend</h3><div class="cs">Severe for seniors = 35%+ (B25072 threshold)</div>
    <div class="lg"><span><span class="d" style="background:#7B4EAF"></span>Burdened (30%+)</span><span><span class="d" style="background:rgba(123,78,175,.35)"></span>Severe (35%+)</span></div>
    <div class="cw"><canvas id="c1"></canvas></div>
  </div>
  <div class="card">
    <h3>Senior household counts — a growing population</h3><div class="cs">The 65+ renter population is expanding rapidly</div>
    <div class="lg"><span><span class="d" style="background:#7B4EAF"></span>Total 65+ HH</span><span><span class="d" style="background:#D4537E"></span>Burdened (30%+)</span></div>
    <div class="cw"><canvas id="c2"></canvas></div>
  </div>
</div>
<script>
Chart.defaults.color='#94a3b8';Chart.defaults.borderColor='rgba(255,255,255,0.06)';
var L=["2014","2015","2016","2017","2018","2019","2020","2021","2022","2023","2024"],gC='rgba(255,255,255,0.04)';
var ln=function(l,d,c,f){return{label:l,data:d,borderColor:c,backgroundColor:f?c.replace(')',',0.06)').replace('rgb','rgba'):'transparent',fill:!!f,tension:.3,pointRadius:2,borderWidth:2}};

new Chart(document.getElementById('c1'),{type:'line',data:{labels:L,datasets:[
  ln('Burdened (30%+)',[63.2,63.5,64.2,66.5,63.4,62.3,63.5,63.4,61.9,63.9,63.7],'rgb(123,78,175)',1),
  ln('Severe (35%+)',[53.1,54.1,54.8,55.5,53.2,52.6,53.3,52.9,52.9,54.1,54.9],'rgba(123,78,175,0.35)',1)
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y.toFixed(1)+'%'}}}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{min:40,max:75,ticks:{color:'#64748b',font:{size:10},callback:function(v){return v+'%'}},grid:{color:gC}}}}});

new Chart(document.getElementById('c2'),{type:'line',data:{labels:L,datasets:[
  ln('Total 65+ HH',[8702,9282,9211,9477,9783,9933,10718,11033,11728,11969,12153],'rgb(123,78,175)',1),
  ln('Burdened (30%+)',[5502,5891,5913,6302,6205,6185,6807,6993,7257,7644,7736],'#D4537E',1)
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+Math.round(c.parsed.y).toLocaleString()}}}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10},callback:function(v){return(v/1000).toFixed(0)+'K'}},grid:{color:gC}}}}});
</script>
</body>
</html>

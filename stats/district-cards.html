<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>District Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;color:#f1f5f9;padding:0 28px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:1100px;margin:0 auto}
.dc{background:#1e2540;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px 18px;transition:border-color .3s}
.dc:hover{border-color:rgba(255,255,255,.12)}
.dc-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.04);padding-bottom:8px}
.dc-name{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400}
.dc-flag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:4px}
.above{background:rgba(210,51,63,.15);color:#D2333F}
.below{background:rgba(52,211,153,.1);color:#34d399}
.dc-rows{display:flex;flex-direction:column;gap:8px}
.dc-row{display:flex;align-items:center;gap:10px}
.dc-stat{flex:0 0 auto;min-width:64px}
.dc-stat .val{font-size:16px;font-weight:700;line-height:1.2}
.dc-stat .lbl{font-size:9px;color:#64748b;line-height:1.2}
.dc-spark{flex:1;height:28px;position:relative}
.dc-spark canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important}
.dc-delta{flex:0 0 auto;font-size:9px;font-weight:600;text-align:right;min-width:50px}
.up{color:#D2333F}.dn{color:#34d399}.nt{color:#64748b}
.bl{color:#4d8ae8}.pu{color:#7B4EAF}.pp{color:#F7BA21}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grid" id="cards"></div>

<script>
Chart.defaults.animation=false;
var D=[
{d:'District 1',rb:56.8,rbO:58.4,sr:2430,srP:67.8,srO:58.6,li:5617,liS:67.2,liO:55.7,
 rbT:[58.4,60.6,58.4,55.3,54.8,55.8,54.9,56.5,57.5,58.2,56.8],
 srT:[58.6,60.1,58.2,60.8,60.3,62.4,63.9,70.8,68.8,69.9,67.8],
 liT:[55.7,57.2,57.0,56.8,58.3,59.9,62.4,66.2,68.1,66.8,67.2]},
{d:'District 2',rb:56.3,rbO:56.2,sr:1445,srP:74.3,srO:79.1,li:4356,liS:75.6,liO:63.8,
 rbT:[56.2,55.0,52.7,53.2,54.0,54.1,53.8,55.8,56.1,55.0,56.3],

 liT:[63.8,61.8,63.5,66.7,67.2,67.7,72.3,71.4,71.0,75.4,75.6]},
{d:'District 3',rb:45.8,rbO:46.4,sr:1247,srP:59.2,srO:67.0,li:2218,liS:78.3,liO:67.8,
 rbT:[46.4,44.7,42.5,41.4,43.0,42.8,42.3,43.3,44.8,43.9,45.8],
 srT:[67.0,65.0,64.0,68.0,67.5,64.2,64.8,64.4,58.9,58.2,59.2],
 liT:[67.8,68.0,68.7,67.1,69.4,71.3,71.5,75.5,76.0,79.3,78.3]},
{d:'District 4',rb:46.5,rbO:47.1,sr:530,srP:60.1,srO:63.4,li:1271,liS:67.7,liO:71.5,

 srT:[63.4,63.0,63.1,58.4,46.9,46.5,41.8,48.6,46.0,52.0,60.1],
 liT:[71.5,63.8,62.8,57.6,57.9,57.2,63.0,64.6,71.6,67.8,67.7]},
{d:'District 5',rb:48.8,rbO:48.0,sr:969,srP:61.3,srO:65.0,li:1171,liS:68.9,liO:55.3,
 rbT:[48.0,44.9,46.7,46.8,47.1,46.4,48.7,50.1,47.5,48.9,48.8],
 srT:[65.0,70.7,69.4,68.7,68.2,67.8,73.0,62.4,65.9,63.2,61.3],
 liT:[55.3,61.8,61.8,62.8,65.1,59.1,64.8,75.6,64.4,64.2,68.9]},
{d:'District 6',rb:58.0,rbO:62.3,sr:1881,srP:67.8,srO:58.4,li:3823,liS:75.3,liO:57.8,

 srT:[58.4,56.5,58.8,64.4,59.4,61.5,62.7,66.2,63.0,69.3,67.8],
 liT:[57.8,56.2,59.2,59.6,59.3,61.4,62.2,65.6,69.0,70.8,75.3]},
{d:'District 7',rb:49.1,rbO:58.5,sr:1401,srP:52.7,srO:51.4,li:2371,liS:65.7,liO:50.6,
 rbT:[58.5,55.6,52.3,54.0,49.8,46.4,47.7,48.0,49.5,51.2,49.1],
 srT:[51.4,50.7,55.3,59.3,55.0,47.6,55.6,51.2,53.0,54.6,52.7],
 liT:[50.6,46.4,47.7,54.2,55.0,52.8,56.7,59.1,63.1,64.6,65.7]},
{d:'District 8',rb:54.8,rbO:57.1,sr:1145,srP:60.8,srO:58.6,li:2942,liS:63.2,liO:52.4,
 rbT:[57.1,57.9,55.7,54.1,53.4,54.9,54.4,56.0,52.5,57.0,54.8],
 srT:[58.6,57.3,58.2,62.8,55.9,53.7,59.5,60.9,54.7,61.7,60.8],
 liT:[52.4,53.9,54.7,54.5,54.2,54.9,57.2,58.6,61.6,65.3,63.2]},
{d:'District 9',rb:53.3,rbO:62.0,sr:1105,srP:59.4,srO:70.7,li:2148,liS:74.0,liO:66.5,
 rbT:[62.0,62.4,63.0,62.0,62.1,62.5,61.6,59.8,57.3,54.6,53.3],
 srT:[70.7,72.2,75.1,71.1,65.9,66.2,59.8,54.4,54.9,56.3,59.4],
 liT:[66.5,64.8,67.4,72.8,68.2,69.0,67.8,73.0,70.0,72.9,74.0]}
];

var AVG=53.1;
var ctr=document.getElementById('cards');

D.forEach(function(dd,idx){
  var above=dd.rb>AVG;
  var rbDelta=dd.rb-dd.rbO;
  var srDelta=dd.srP-dd.srO;
  var liDelta=dd.liS-dd.liO;
  var id='d'+(idx+1);

  ctr.innerHTML+='<div class="dc">'+
    '<div class="dc-top"><span class="dc-name">'+dd.d+'</span>'+
    '<span class="dc-flag '+(above?'above':'below')+'">'+(above?'Above avg':'Below avg')+'</span></div>'+
    '<div class="dc-rows">'+
      '<div class="dc-row"><div class="dc-stat"><div class="val bl">'+dd.rb.toFixed(1)+'%</div><div class="lbl">Burden 30%+</div></div>'+
      '<div class="dc-spark"><canvas id="'+id+'a"></canvas></div>'+
      '<div class="dc-delta '+(rbDelta>0?'up':'dn')+'">'+(rbDelta>0?'▲':'▼')+Math.abs(rbDelta).toFixed(1)+'pp</div></div>'+

      '<div class="dc-row"><div class="dc-stat"><div class="val pu">'+dd.srP.toFixed(1)+'%</div><div class="lbl">65+ burden</div></div>'+
      '<div class="dc-spark"><canvas id="'+id+'b"></canvas></div>'+
      '<div class="dc-delta '+(srDelta>0?'up':'dn')+'">'+(srDelta>0?'▲':'▼')+Math.abs(srDelta).toFixed(1)+'pp</div></div>'+

      '<div class="dc-row"><div class="dc-stat"><div class="val pp">'+dd.liS.toFixed(1)+'%</div><div class="lbl">LI severe</div></div>'+
      '<div class="dc-spark"><canvas id="'+id+'c"></canvas></div>'+
      '<div class="dc-delta '+(liDelta>0?'up':'dn')+'">'+(liDelta>0?'▲':'▼')+Math.abs(liDelta).toFixed(1)+'pp</div></div>'+

    '</div></div>';
});

function spark(id,data,color){
  new Chart(document.getElementById(id),{type:'line',data:{labels:data.map(function(_,i){return i}),datasets:[{data:data,borderColor:color,backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false,min:Math.min.apply(null,data)-5,max:Math.max.apply(null,data)+5}}}});
}

D.forEach(function(dd,idx){
  var id='d'+(idx+1);
  spark(id+'a',dd.rbT,'#4d8ae8');
  spark(id+'b',dd.srT,'#7B4EAF');
  spark(id+'c',dd.liT,'#F7BA21');
});
</script>
</body>
</html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

{label:'Burdened (30%+)',data:b,borderColor:'#7B4EAF',backgroundColor:'rgba(123,78,175,0.08)',fill:true,tension:0.3,pointRadius:2,borderWidth:2},

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Citywide Renter Metrics — LiBRE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#1F2937;background:transparent;padding:4px}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.c{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px}
.c .l{font-size:16px;color:#6B7280;margin-bottom:3px}
.c .v{font-size:32px;font-weight:700;margin-bottom:2px}
.c .d{font-size:14px;font-weight:600}
.dg{color:#1D9E75}.dr{color:#E24B4A}.dn{color:#6B7280}
.tb{border-top:3px solid #276ADB}
</style>
</head>
<body>
<div class="g" role="region" aria-label="All renter household statistics 2020-2024">
  <div class="c tb" role="group" aria-label="Total renter households">
    <div class="l">Total renter households</div>
    <div class="v" role="text" aria-label="99,965 total renter households">99,965</div>
    <div class="d dn" role="text" aria-label="Increased by 12,702 over 10 years">▲ +12,702 (+14.6%) over 10yr</div>
  </div>
  <div class="c tb" role="group" aria-label="Cost burdened">
    <div class="l">Cost burdened (30%+)</div>
    <div class="v" role="text" aria-label="53.1 percent cost burdened">53.1%</div>
    <div class="d dg" role="text" aria-label="Improved 2.3 percentage points from 55.4 percent">▼ 2.3pp improved from 55.4%</div>
  </div>
  <div class="c tb" role="group" aria-label="Severely burdened">
    <div class="l">Severely burdened (50%+)</div>
    <div class="v" role="text" aria-label="26.7 percent severely burdened">26.7%</div>
    <div class="d dg" role="text" aria-label="Improved 3.2 percentage points from 29.9 percent">▼ 3.2pp improved from 29.9%</div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Senior Metrics — LiBRE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#1F2937;background:transparent;padding:4px}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.c{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px}
.c .l{font-size:12px;color:#6B7280;margin-bottom:3px}
.c .v{font-size:24px;font-weight:700;margin-bottom:2px}
.c .d{font-size:11px;font-weight:600}
.dg{color:#1D9E75}.dr{color:#E24B4A}.dn{color:#6B7280}
.tp{border-top:3px solid #7B4EAF}
</style>
</head>
<body>
<div class="g" role="region" aria-label="Senior renter statistics 2020-2024">
  <div class="c tp" role="group" aria-label="Senior renters">
    <div class="l">65+ senior renters</div>
    <div class="v" role="text" aria-label="12,153 senior renter households">12,153</div>
    <div class="d dr" role="text" aria-label="Grew 39.7 percent, worsened">▲ +39.7% growth (+3,451 HH)</div>
  </div>
  <div class="c tp" role="group" aria-label="Senior burden rate">
    <div class="l">65+ burdened (30%+)</div>
    <div class="v" role="text" aria-label="63.6 percent of seniors burdened">63.6%</div>
    <div class="d dr" role="text" aria-label="Worsened 0.4 percentage points">▲ +0.4pp worsened from 63.2%</div>
  </div>
</div>
</body>
</html>

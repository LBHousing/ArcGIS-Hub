<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Low-Income Metrics — LiBRE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#1F2937;background:transparent;padding:4px}
.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.c{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:16px}
.c .l{font-size:12px;color:#6B7280;margin-bottom:3px}
.c .v{font-size:24px;font-weight:700;margin-bottom:2px}
.c .d{font-size:11px;font-weight:600}
.dg{color:#1D9E75}.dr{color:#E24B4A}.dn{color:#6B7280}
.to{border-top:3px solid #F7BA21}
</style>
</head>
<body>
<div class="g" role="region" aria-label="Low-income renter statistics 2020-2024">
  <div class="c to" role="group" aria-label="Low-income severe burden">
    <div class="l">Low-income severe (50%+)</div>
    <div class="v" role="text" aria-label="70.8 percent severely burdened">70.8%</div>
    <div class="d dr" role="text" aria-label="Worsened 11.3 percentage points">▲ +11.3pp worsened from 59.5%</div>
  </div>
  <div class="c to" role="group" aria-label="Low-income remaining">
    <div class="l">Low-income HH remaining</div>
    <div class="v" role="text" aria-label="25,917 low-income households">25,917</div>
    <div class="d dr" role="text" aria-label="Decreased 15,165 indicating displacement">▼ -15,165 (-36.9%) displaced</div>
  </div>
  <div class="c to" role="group" aria-label="Low-income share">
    <div class="l">Low-income share of renters</div>
    <div class="v" role="text" aria-label="25.9 percent of renters are low-income">25.9%</div>
    <div class="d dr" role="text" aria-label="Decreased 21.2 percentage points from 47.1 percent">▼ -21.2pp from 47.1%</div>
  </div>
</div>
</body>
</html>

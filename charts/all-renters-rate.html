<style>

<div role="figure" aria-label="Cost burden trend: 55.4% in 2014 declining to 53.1% in 2024. Severe: 29.9% to 26.7%." style="background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:20px;">

  <p style="font-size:12px;color:#9CA3AF;margin:0 0 10px;">All renter households spending 30%+ or 50%+ of income on housing (ACS B25070)</p>
  <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:12px;color:#6B7280;"><span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#276ADB;display:inline-block;" aria-hidden="true"></span>Cost burdened (30%+)</span><span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(39,106,219,0.35);display:inline-block;" aria-hidden="true"></span>Severely burdened (50%+)</span></div>
  <div style="position:relative;width:100%;height:min(280px,60vw);min-height:180px;">

  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>(function(){ var L=["2014","2015","2016","2017","2018","2019","2020","2021","2022","2023","2024"],b=[55.4,55.0,53.4,52.5,52.7,52.6,52.4,53.2,53.0,53.4,53.1],s=[29.9,29.2,28.7,27.8,27.2,26.5,26.2,26.4,26.8,26.8,26.7];

{label:'Cost burdened (30%+)',data:b,borderColor:'#276ADB',backgroundColor:'rgba(39,106,219,0.08)',fill:true,tension:0.3,pointRadius:2,borderWidth:2},
{label:'Severely burdened (50%+)',data:s,borderColor:'rgba(39,106,219,0.35)',backgroundColor:'rgba(39,106,219,0.04)',fill:true,tension:0.3,pointRadius:2,borderWidth:2}

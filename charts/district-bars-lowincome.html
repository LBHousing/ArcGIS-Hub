<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Low-income — severe burden (50%+) by district — LiBRE District Statistics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#1F2937;background:transparent;line-height:1.6;padding:8px}
</style>
</head>
<body>

<div role="figure" aria-label="District comparison: D1 67.2%, D2 75.6%, D3 78.3%, D4 67.7%, D5 68.9%, D6 75.3%, D7 65.7%, D8 63.2%, D9 74.0%. Average 70.8%." style="background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:20px;">
  <h3 style="font-size:15px;font-weight:700;color:#1F2937;margin:0 0 3px;">Low-income — severe burden (50%+) by district</h3>
  <p style="font-size:12px;color:#9CA3AF;margin:0 0 10px;">2020-2024 | Districts above citywide average (70.8%) shown in red</p>
  <div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:12px;color:#6B7280;"><span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#F7BA21;display:inline-block;" aria-hidden="true"></span>At or below average</span><span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#D2333F;display:inline-block;" aria-hidden="true"></span>Above average</span></div>
  <div style="position:relative;width:100%;height:280px;">
    <canvas id="blo" role="img" aria-label="District comparison: D1 67.2%, D2 75.6%, D3 78.3%, D4 67.7%, D5 68.9%, D6 75.3%, D7 65.7%, D8 63.2%, D9 74.0%. Average 70.8%."></canvas>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>(function(){ var avg=70.8,d=[67.2, 75.6, 78.3, 67.7, 68.9, 75.3, 65.7, 63.2, 74.0];
new Chart(document.getElementById('blo'),{type:'bar',data:{labels:['D1','D2','D3','D4','D5','D6','D7','D8','D9'],datasets:[{data:d,backgroundColor:d.map(function(v){return v>avg?'#D2333F':'#F7BA21'}),borderRadius:4,barPercentage:0.65}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return'District '+(c.dataIndex+1)+': '+c.parsed.y.toFixed(1)+'%'}}}},scales:{x:{ticks:{color:'rgba(0,0,0,0.45)',font:{size:12}},grid:{display:false}},y:{max:85,ticks:{color:'rgba(0,0,0,0.45)',font:{size:11},callback:function(v){return v+'%'}},grid:{color:'rgba(0,0,0,0.06)'}}}}}); })();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LiBRE Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#0a0e1a;padding:0 28px}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:rgba(255,255,255,.06);border-radius:12px;overflow:hidden;max-width:1100px;margin:0 auto}
.cell{background:#1e2540;padding:28px 24px;text-align:center}
.cell .num{font-size:34px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:4px}
.cell .lbl{font-size:12px;color:#64748b;letter-spacing:.5px}
.bl{color:#4d8ae8}.rd{color:#D2333F}.pp{color:#F7BA21}.gn{color:#34d399}
@media(max-width:600px){.row{grid-template-columns:1fr 1fr}.cell{padding:20px 16px}.cell .num{font-size:26px}}
</style>
</head>
<body>
<div class="row" role="region" aria-label="Key citywide statistics">
  <div class="cell"><div class="num bl" id="s1">0</div><div class="lbl">Total dwelling units</div></div>
  <div class="cell"><div class="num rd" id="s2">0%</div><div class="lbl">Renters cost burdened</div></div>
  <div class="cell"><div class="num pp" id="s3">0</div><div class="lbl">Entity-owned units</div></div>
  <div class="cell"><div class="num gn" id="s4">0</div><div class="lbl">Senior renters (65+)</div></div>
</div>
<script>
function animateCount(el, target, suffix, duration) {
  var start = 0, step = Math.max(1, Math.ceil(target / 60)), frames = Math.ceil(duration / 16.67);
  var increment = target / frames;
  var current = 0;
  var timer = setInterval(function() {
    current += increment;
    if (current >= target) { current = target; clearInterval(timer); }
    el.textContent = Math.round(current).toLocaleString() + (suffix || '');
  }, 16.67);
}
animateCount(document.getElementById('s1'), 186658, '', 2000);
animateCount(document.getElementById('s3'), 46513, '', 2000);
animateCount(document.getElementById('s4'), 12153, '', 2000);
// Percentage counter
(function(){
  var el = document.getElementById('s2'), target = 53.1, current = 0;
  var timer = setInterval(function() {
    current += 0.9;
    if (current >= target) { current = target; clearInterval(timer); }
    el.textContent = current.toFixed(1) + '%';
  }, 16.67);
})();
</script>
</body>
</html>
